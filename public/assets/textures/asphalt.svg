<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="asphaltBase" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="6" seed="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" in="noise" result="grayNoise"
        values="0 0 0 0 0.22
                0 0 0 0 0.22
                0 0 0 0 0.24
                0 0 0 1 0"/>
    </filter>
    <filter id="asphaltGrit" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="1.2" numOctaves="3" seed="14" stitchTiles="stitch" result="grit"/>
      <feColorMatrix type="matrix" in="grit" result="gritColor"
        values="0 0 0 0 0.15
                0 0 0 0 0.15
                0 0 0 0 0.15
                0 0 0 0.3 0"/>
    </filter>
    <filter id="asphaltCracks" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="5" seed="42" stitchTiles="stitch" result="crack"/>
      <feColorMatrix type="matrix" in="crack" result="crackColor"
        values="0 0 0 0 0.08
                0 0 0 0 0.08
                0 0 0 0 0.08
                0 0 0 0.12 0"/>
    </filter>
  </defs>
  <!-- Dark base -->
  <rect width="256" height="256" fill="#2a2a2e"/>
  <!-- Rough noise surface -->
  <rect width="256" height="256" filter="url(#asphaltBase)" opacity="1"/>
  <!-- Fine grit -->
  <rect width="256" height="256" filter="url(#asphaltGrit)" opacity="1"/>
  <!-- Subtle cracks -->
  <rect width="256" height="256" filter="url(#asphaltCracks)" opacity="1"/>
</svg>
