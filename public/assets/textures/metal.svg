<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="metalSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8a8a8"/>
      <stop offset="25%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#d8d8d8"/>
      <stop offset="75%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <filter id="metalBrush" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.8" numOctaves="5" seed="11" stitchTiles="stitch" result="brush"/>
      <feColorMatrix type="matrix" in="brush" result="brushColor"
        values="0 0 0 0 0.6
                0 0 0 0 0.62
                0 0 0 0 0.65
                0 0 0 1 0"/>
    </filter>
    <filter id="metalScuff" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.3" numOctaves="3" seed="27" stitchTiles="stitch" result="scuff"/>
      <feColorMatrix type="matrix" in="scuff" result="scuffColor"
        values="0 0 0 0 0.3
                0 0 0 0 0.3
                0 0 0 0 0.32
                0 0 0 0.2 0"/>
    </filter>
    <filter id="metalHighlight" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.25" numOctaves="2" seed="40" stitchTiles="stitch" result="hl"/>
      <feColorMatrix type="matrix" in="hl" result="hlColor"
        values="0 0 0 0 0.95
                0 0 0 0 0.95
                0 0 0 0 0.97
                0 0 0 0.08 0"/>
    </filter>
  </defs>
  <!-- Metallic gradient base -->
  <rect width="256" height="256" fill="url(#metalSheen)"/>
  <!-- Brushed metal streaks -->
  <rect width="256" height="256" filter="url(#metalBrush)" opacity="1"/>
  <!-- Surface scuffs -->
  <rect width="256" height="256" filter="url(#metalScuff)" opacity="1"/>
  <!-- Specular highlights -->
  <rect width="256" height="256" filter="url(#metalHighlight)" opacity="1"/>
</svg>
